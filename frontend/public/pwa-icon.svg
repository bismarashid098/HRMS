<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle overlay -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- W Letter -->
  <text x="256" y="330" font-family="Arial, sans-serif" font-size="280" font-weight="900" text-anchor="middle" fill="white" opacity="0.95">W</text>
  <!-- Small dots for decoration -->
  <circle cx="140" cy="380" r="14" fill="white" opacity="0.25"/>
  <circle cx="372" cy="380" r="14" fill="white" opacity="0.25"/>
</svg>
